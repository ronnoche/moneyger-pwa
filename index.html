<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <meta
      name="theme-color"
      content="#fafbfc"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#141921"
      media="(prefers-color-scheme: dark)"
    />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Moneyger" />
    <meta name="application-name" content="Moneyger" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon-180x180.png"
    />

    <title>Moneyger</title>
    <meta
      name="description"
      content="Zero-based envelope budgeting, offline-first."
    />
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('moneyger:theme');
          var dark =
            pref === 'dark' ||
            ((pref === 'system' || !pref) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
        try {
          var key = 'moneyger:visits';
          var n = parseInt(localStorage.getItem(key) || '0', 10);
          if (isNaN(n)) n = 0;
          localStorage.setItem(key, String(n + 1));
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
